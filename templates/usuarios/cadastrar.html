{% extends 'base.html' %}

{% block content %}

<div class="page-header">

    <div>
        <h2>Cadastrar Usuário</h2>
        <p>Novo usuário do sistema.</p>
    </div>

</div>

<div class="form-card">

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <div class="produto-acoes">

            <button type="submit" class="btn-salvar-produto">
                Salvar Usuário
            </button>

            <a href="{% url 'listar_usuarios' %}" class="btn-cancelar-produto">
                Cancelar
            </a>

        </div>

    </form>

</div>

{% endblock %}
