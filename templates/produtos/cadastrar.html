{% extends 'base.html' %}

{% block content %}

<div class="page-header">

    <div>
        <h2>Novo Produto</h2>
        <p>Cadastro de produto do sistema.</p>
    </div>

</div>

<div class="form-card">

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <div class="produto-acoes">

            <button type="submit" class="btn-salvar-produto">
                Salvar Produto
            </button>

            <a href="{% url 'listar_produtos' %}" class="btn-cancelar-produto">
                Cancelar
            </a>

        </div>

    </form>

</div>

{% endblock %}
