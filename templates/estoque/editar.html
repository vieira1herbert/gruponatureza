{% extends 'base.html' %}

{% block content %}

<div class="page-header">
    <div>
        <h2>Editar Estoque</h2>
        <p>{{ estoque.produto.nome }} - {{ estoque.franquia.nome }}</p>
    </div>
</div>

<div class="form-card">

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <div class="produto-acoes">

            <button type="submit" class="btn-salvar-produto">
                Salvar Alterações
            </button>

            <a href="{% url 'listar_estoque' %}" class="btn-cancelar-produto">
                Cancelar
            </a>

        </div>

    </form>

</div>

{% endblock %}
